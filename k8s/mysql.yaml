apiVersion: v1
kind: Service
metadata:
  name: mysql-db
  namespace: micro-app
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  namespace: micro-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-db
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
      - name: mysql
        image: docker.io/library/mysql:8.0
        imagePullPolicy: Never
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password" 
        - name: MYSQL_DATABASE
          value: "consumer_db"
        ports:
          - containerPort: 3306