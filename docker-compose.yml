services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: broker
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  mongodb:
    image: mongo:7.0
    container_name: producer_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  mysql_db:
    image: mysql:8.0
    container_name: consumer_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: consumer_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  producer_service:
    build:
      context: ./producer-service
      dockerfile: Dockerfile
    container_name: producer_app
    environment:
      - RABBIT_HOST=rabbitmq
      - MONGO_URI=mongodb://mongodb:27017/producer_db
    depends_on:
      rabbitmq: 
        condition: service_healthy
      mongodb:
        condition: service_healthy
      
  consumer_service:
    build:
      context: ./consumer-service
      dockerfile: Dockerfile
    container_name: consumer_app
    environment:
      - RABBIT_HOST=rabbitmq
      - DB_HOST=mysql_db
      - DB_PASSWORD=password
    depends_on:
      rabbitmq: 
        condition: service_healthy
      mysql_db:
        condition: service_healthy

volumes:
  rabbit_data:
  mongo_data:
  mysql_data: